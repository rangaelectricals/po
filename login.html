<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PO Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.20/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e1b4b 100%);">
    <!-- Animated background blobs -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute w-96 h-96 bg-indigo-500/20 rounded-full filter blur-3xl animate-blob" style="top:-10%;left:-5%;"></div>
      <div class="absolute w-80 h-80 bg-purple-500/20 rounded-full filter blur-3xl animate-blob animation-delay-2000" style="top:50%;right:-10%;"></div>
      <div class="absolute w-72 h-72 bg-blue-500/15 rounded-full filter blur-3xl animate-blob animation-delay-4000" style="bottom:-10%;left:30%;"></div>
    </div>

    <div class="relative z-10 w-full max-w-md mx-4">
      <div class="bg-white/10 backdrop-blur-xl rounded-2xl border border-white/10 shadow-2xl overflow-hidden">
        <!-- Gradient header -->
        <div class="bg-gradient-to-r from-indigo-600 via-purple-600 to-blue-600 px-8 py-6 text-center relative overflow-hidden">
          <div class="absolute inset-0 opacity-20">
            <div class="absolute w-32 h-32 bg-white rounded-full" style="top:-16px;left:-16px;filter:blur(40px);"></div>
            <div class="absolute w-24 h-24 bg-yellow-300 rounded-full" style="bottom:-12px;right:-12px;filter:blur(30px);"></div>
          </div>
          <div class="relative">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-white/20 backdrop-blur-sm rounded-xl mb-3">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
              </svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight">PO Manager</h1>
            <p class="text-white/70 text-xs mt-1 uppercase tracking-widest">Ranga Electricals Pvt Ltd</p>
          </div>
        </div>

        <div class="p-8">
          <!-- Login Form -->
          <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-control mb-4">
              <label class="label pb-1"><span class="text-white/80 text-sm font-medium">Username</span></label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-white/30">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </span>
                <input id="loginUser" type="text" placeholder="Enter username"
                  class="w-full bg-white/10 border border-white/15 text-white placeholder-white/30 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all"
                  autocomplete="username" required autofocus />
              </div>
            </div>
            <div class="form-control mb-1">
              <label class="label pb-1"><span class="text-white/80 text-sm font-medium">Password</span></label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-white/30">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </span>
                <input id="loginPass" type="password" placeholder="Enter password"
                  class="w-full bg-white/10 border border-white/15 text-white placeholder-white/30 rounded-xl pl-10 pr-10 py-2.5 text-sm focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-400/30 transition-all"
                  autocomplete="current-password" required />
                <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-white/30 hover:text-white/60 transition-colors" onclick="togglePassword()">
                  <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
              </div>
            </div>

            <div id="loginError" class="text-red-400 text-sm mt-3 hidden"></div>

            <button type="submit" id="loginBtn"
              class="w-full mt-6 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-2.5 rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-0.5 flex items-center justify-center gap-2 text-sm">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
              Sign In
            </button>
          </form>

          <div class="flex items-center gap-3 my-5">
            <div class="flex-1 h-px bg-white/10"></div>
            <span class="text-white/25 text-[10px] uppercase tracking-widest">Secure Access</span>
            <div class="flex-1 h-px bg-white/10"></div>
          </div>
          <p class="text-[11px] text-center text-white/25">Contact admin for account access</p>
        </div>
      </div>
    </div>

    <script>
      var API_URL = 'https://script.google.com/macros/s/AKfycbx4V3wD2cM8dF2tz0mD2DJUFyJLLAfji-7yHJKNuqNHLZP30ylkmBJG_gB3serhxNg/exec';

      // Fetch users: try API first, then users.json fallback
      function fetchUsers() {
        return fetch(API_URL + '?action=read_users', { redirect: 'follow' })
          .then(function(res) { return res.json(); })
          .then(function(data) {
            var users = Array.isArray(data) ? data : (data.users || []);
            if (users.length > 0) return users;
            // API returned empty — seed from users.json
            return seedFromJSON();
          })
          .catch(function() {
            // API not available — fall back to users.json
            return fetch('users.json').then(function(r) { return r.json(); }).catch(function() {
              return [{ username: 'ranga', password: 'Ranga@7677', role: 'admin' }];
            });
          });
      }

      function seedFromJSON() {
        return fetch('users.json').then(function(r) { return r.json(); }).then(function(users) {
          if (users.length > 0) {
            // Seed API with default users
            return fetch(API_URL, {
              method: 'POST', redirect: 'follow',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'save_users', users: users })
            }).then(function() { return users; }).catch(function() { return users; });
          }
          return [{ username: 'ranga', password: 'Ranga@7677', role: 'admin' }];
        }).catch(function() {
          return [{ username: 'ranga', password: 'Ranga@7677', role: 'admin' }];
        });
      }

      // Check if already logged in
      function checkExistingSession() {
        var session = JSON.parse(localStorage.getItem('po_session') || 'null');
        if (session && session.username) {
          window.location.href = 'index.html';
        }
      }

      function togglePassword() {
        var inp = document.getElementById('loginPass');
        var icon = document.getElementById('eyeIcon');
        if (inp.type === 'password') {
          inp.type = 'text';
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21" />';
        } else {
          inp.type = 'password';
          icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
        }
      }

      function handleLogin(e) {
        e.preventDefault();
        var errEl = document.getElementById('loginError');
        errEl.classList.add('hidden');

        var username = document.getElementById('loginUser').value.trim().toLowerCase();
        var password = document.getElementById('loginPass').value;

        if (!username || !password) {
          errEl.textContent = 'Please enter both username and password.';
          errEl.classList.remove('hidden');
          return false;
        }

        // Show loading
        var btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span> Signing in...';

        fetchUsers().then(function(users) {
          var user = users.find(function(u) { return u.username.toLowerCase() === username; });

          if (!user || user.password !== password) {
            errEl.textContent = 'Invalid username or password.';
            errEl.classList.remove('hidden');
            document.getElementById('loginPass').value = '';
            document.getElementById('loginPass').focus();
            btn.disabled = false;
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg> Sign In';
            return;
          }

          // Store session
          localStorage.setItem('po_session', JSON.stringify({
            username: user.username,
            role: user.role,
            loginTime: new Date().toISOString()
          }));

          window.location.href = 'index.html';
        });

        return false;
      }

      // Init
      checkExistingSession();
    </script>
</body>
</html>

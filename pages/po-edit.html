    <link rel="stylesheet" href="../style.css">

</head>
<body class="page-bg min-h-screen">
    <div class="app-shell min-h-screen flex">
      <input id="main-drawer" type="checkbox" class="drawer-toggle" />
      <div class="app-main drawer-content flex-1 min-h-screen flex flex-col">

        <div class="w-full navbar modern-navbar sticky top-0 z-30 px-4">
          <div class="flex-none">
            <label for="main-drawer" class="btn btn-square btn-ghost">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </label>
          </div>
          <div class="flex-1 px-2 text-xl font-bold text-primary">Edit Purchase Order</div>
          <div class="flex gap-2">
            <button type="button" class="btn btn-sm btn-outline btn-primary gap-1 lg:hidden" onclick="togglePreviewPanel()">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              Preview
            </button>
            <a href="po-list.html" class="btn btn-ghost btn-sm gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
              Back
            </a>
          </div>
        </div>
        <!-- Main Content -->
        <div class="p-4 md:p-6 w-full">
          <div class="flex flex-col lg:flex-row gap-4 items-start">
            <!-- LEFT: Form Container -->
            <div class="w-full lg:w-1/2 xl:min-w-[420px] flex-shrink-0">
              <div id="poEditContainer" class="card bg-base-100 shadow border border-base-300 compact-form">
                <div class="card-body">
                  <div class="flex justify-center py-8"><span class="loading loading-spinner loading-lg text-primary"></span><span class="ml-3 text-base-content/60">Loading PO data...</span></div>
                </div>
              </div>
            </div>
            <!-- RIGHT: Live PDF Preview -->
            <div id="previewPanel" class="w-full lg:w-1/2 lg:sticky lg:top-4 hidden lg:block">
              <div class="card bg-base-100 shadow border border-base-300">
                <div class="card-body p-3">
                  <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-sm text-primary flex items-center gap-1">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                      Live PDF Preview
                    </h3>
                    <div class="flex gap-1">
                      <label class="flex items-center gap-1 cursor-pointer text-xs">
                        <input type="checkbox" id="includeSignToggle" class="checkbox checkbox-xs checkbox-primary" checked onchange="generateLivePreview()">
                        <span>Include Seal</span>
                      </label>
                      <button type="button" class="btn btn-xs btn-ghost" onclick="generateLivePreview()" title="Refresh preview">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                      </button>
                      <button type="button" class="btn btn-xs btn-ghost lg:hidden" onclick="togglePreviewPanel()">&#10005;</button>
                    </div>
                  </div>
                  <div class="bg-base-200 rounded-lg overflow-hidden" style="height: calc(100vh - 140px); min-height: 500px;">
                    <iframe id="pdfPreviewFrame" class="w-full h-full border-0" style="background:#525659;"></iframe>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Sidebar -->
      <div class="app-sidebar-shell drawer-side">
        <label for="main-drawer" class="drawer-overlay app-overlay"></label>
        <aside class="modern-sidebar">
          <div class="sidebar-brand">PO Manager</div>
          <ul class="menu menu-md p-4 gap-1 flex-1">
            <li><a href="../index.html">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4" /></svg>
              Dashboard
            </a></li>
            <li><a href="add-po.html">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
              Create PO
            </a></li>
            <li><a href="po-list.html">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
              Purchase Orders
            </a></li>
            <li><a href="analytics.html">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
              Analytics
            </a></li>
            <li><a href="vendor-master.html">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
              Vendor Master
            </a></li>
            <li><a href="item-master.html">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
              Item Master
            </a></li>
          </ul>
        </aside>
      </div>
    </div>
    <script src="../main.js"></script>
    <script>
      function getQueryParam(name) {
        return new URL(window.location.href).searchParams.get(name);
      }

      var editItems = [];

      // ── Toggle preview on mobile ──
      function togglePreviewPanel() {
        var panel = document.getElementById('previewPanel');
        panel.classList.toggle('hidden');
        if (!panel.classList.contains('hidden')) generateLivePreview();
      }

      // ── Debounced preview ──
      var _previewTimer = null;
      function schedulePreview() {
        clearTimeout(_previewTimer);
        _previewTimer = setTimeout(generateLivePreview, 400);
      }

      // ── Generate live PDF preview using shared builder ──
      function generateLivePreview() {
        var frame = document.getElementById('pdfPreviewFrame');
        if (!frame || !window.jspdf || typeof buildPODocument !== 'function') return;
        if (!document.getElementById('editPOForm')) return;

        var val = function(id) { var el = document.getElementById(id); return el ? el.value : ''; };
        var fval = function(id) { return parseFloat(val(id)) || 0; };

        var doc = buildPODocument({
          po_no: val('edit_po_no'),
          po_date: val('edit_po_date'),
          vendor_name: val('vendor_name'),
          vendor_address: val('vendor_address'),
          vendor_gstin: val('vendor_gstin'),
          client_name: val('edit_client_name'),
          event_name: val('edit_event_name'),
          event_location: val('edit_event_location'),
          event_date: val('edit_event_date'),
          transport: fval('editTransport'),
          cgst_percent: fval('edit_cgst_percent'),
          sgst_percent: fval('edit_sgst_percent'),
          terms: val('edit_terms'),
          items: editItems,
          includeSign: document.getElementById('includeSignToggle') ? document.getElementById('includeSignToggle').checked : false
        });

        if (doc) {
          var blob = doc.output('blob');
          frame.src = URL.createObjectURL(blob);
        }
      }

      // ── Fill an edit row from item master selection ──
      function editFillFromMaster(idx, masterIdx) {
        if (masterIdx === '' || !itemMasterCache[masterIdx]) return;
        var item = itemMasterCache[masterIdx];
        editItems[idx].desc = item.desc || '';
        editItems[idx].uom = item.uom || 'NOS';
        editItems[idx].per_day = parseFloat(item.rate) || 0;
        editItems[idx].total = (parseInt(editItems[idx].qty) || 1) * editItems[idx].per_day * (parseInt(editItems[idx].days) || 1);
        renderEditItemsTable();
      }

      // ── Toggle master/custom mode for Edit PO row ──
      function editToggleMaster(idx, checked) {
        editItems[idx].isMaster = checked;
        if (checked) { editItems[idx].desc = ''; editItems[idx].uom = 'NOS'; editItems[idx].per_day = 0; }
        renderEditItemsTable();
      }

      // ── Render editable items table (checkbox toggle: master select / custom input per row) ──
      function renderEditItemsTable() {
        var masterOpts = (typeof buildItemMasterOptionsHtml === 'function') ? buildItemMasterOptionsHtml() : '';
        var html = '<table class="table table-compact w-full text-xs"><thead><tr class="bg-base-200"><th class="w-8 px-1">#</th><th class="px-1">Description</th><th class="w-14 px-1">Qty</th><th class="w-14 px-1">UOM</th><th class="w-20 px-1">Rate</th><th class="w-14 px-1">Days</th><th class="w-20 text-right px-1">Total</th><th class="w-8 px-1"></th></tr></thead><tbody>';
        var total = 0;
        editItems.forEach(function(item, idx) {
          var t = (parseFloat(item.qty) || 0) * (parseFloat(item.per_day) || 0) * (parseFloat(item.days) || 0);
          editItems[idx].total = t;
          total += t;
          var isMaster = item.isMaster !== false;
          html += '<tr class="hover">';
          html += '<td class="font-mono text-center px-1">' + (idx + 1) + '</td>';
          // Description cell with checkbox toggle
          html += '<td class="px-1"><div class="flex items-center gap-1 mb-0.5">';
          html += '<label class="cursor-pointer flex items-center gap-1 text-[10px] select-none" title="Check to pick from Item Master">';
          html += '<input type="checkbox" class="checkbox checkbox-xs checkbox-primary" ' + (isMaster ? 'checked' : '') + ' onchange="editToggleMaster(' + idx + ',this.checked)">';
          html += '<span class="opacity-60">' + (isMaster ? 'Master' : 'Custom') + '</span></label></div>';
          if (isMaster) {
              html += '<select class="select select-bordered select-xs w-full" onchange="editFillFromMaster(' + idx + ',this.value)">' + masterOpts + '</select>';
          } else {
              html += '<input type="text" class="input input-bordered input-xs w-full" placeholder="Type description" value="' + escHtml(item.desc || '') + '" onchange="editItems[' + idx + '].desc=this.value;schedulePreview()">';
          }
          if (item.desc && isMaster) html += '<div class="text-[10px] mt-0.5 opacity-50 truncate" title="' + escHtml(item.desc) + '">' + escHtml(item.desc) + '</div>';
          html += '</td>';
          html += '<td class="px-1"><input type="number" class="input input-bordered input-xs w-full" value="' + (item.qty || 1) + '" min="1" onchange="editItems[' + idx + '].qty=this.value;renderEditItemsTable()"></td>';
          html += '<td class="px-1"><input type="text" class="input input-bordered input-xs w-full" value="' + escHtml(item.uom || '') + '" onchange="editItems[' + idx + '].uom=this.value;schedulePreview()"></td>';
          html += '<td class="px-1"><input type="number" class="input input-bordered input-xs w-full" value="' + (item.per_day || 0) + '" min="0" step="0.01" onchange="editItems[' + idx + '].per_day=this.value;renderEditItemsTable()"></td>';
          html += '<td class="px-1"><input type="number" class="input input-bordered input-xs w-full" value="' + (item.days || 1) + '" min="1" onchange="editItems[' + idx + '].days=this.value;renderEditItemsTable()"></td>';
          html += '<td class="text-right font-semibold font-mono px-1">\u20b9' + t.toLocaleString('en-IN') + '</td>';
          html += '<td class="px-1"><button type="button" class="btn btn-xs btn-error btn-ghost" onclick="editItems.splice(' + idx + ',1);renderEditItemsTable()" title="Remove"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button></td>';
          html += '</tr>';
        });
        if (!editItems.length) {
          html += '<tr><td colspan="8" class="text-center py-4 text-base-content/40 text-xs">No items yet \u2014 click <strong>+ Add Row</strong></td></tr>';
        }
        html += '</tbody><tfoot><tr><td colspan="8" class="p-1"><button type="button" class="btn btn-xs btn-outline btn-success gap-1 w-full" onclick="addEditItem()"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg> Add Row</button></td></tr></tfoot></table>';
        document.getElementById('editItemsTable').innerHTML = html;

        // Update totals
        var transport = parseFloat((document.getElementById('editTransport') || {}).value) || 0;
        var subtotal = total + transport;
        var cgstPct = parseFloat((document.getElementById('edit_cgst_percent') || {}).value) || 0;
        var sgstPct = parseFloat((document.getElementById('edit_sgst_percent') || {}).value) || 0;
        var cgstAmt = Math.round(subtotal * cgstPct / 100);
        var sgstAmt = Math.round(subtotal * sgstPct / 100);
        var grandTotal = subtotal + cgstAmt + sgstAmt;

        var subLine = document.getElementById('editSubtotalLine');
        var cgstLine = document.getElementById('editCgstLine');
        var sgstLine = document.getElementById('editSgstLine');
        var gtLine = document.getElementById('editGrandTotal');
        if (subLine) subLine.textContent = subtotal.toLocaleString('en-IN');
        if (cgstLine) cgstLine.textContent = cgstPct ? 'CGST @ ' + cgstPct + '% : \u20b9' + cgstAmt.toLocaleString('en-IN') : '';
        if (sgstLine) sgstLine.textContent = sgstPct ? 'SGST @ ' + sgstPct + '% : \u20b9' + sgstAmt.toLocaleString('en-IN') : '';
        if (gtLine) gtLine.textContent = grandTotal.toLocaleString('en-IN');

        schedulePreview();
      }

      function addEditItem() {
        editItems.push({ desc: '', qty: 1, uom: 'NOS', per_day: 0, days: 1, total: 0, isMaster: false });
        renderEditItemsTable();
        setTimeout(function() {
          var rows = document.querySelectorAll('#editItemsTable tbody tr');
          if (rows.length) {
            var lastInput = rows[rows.length - 1].querySelector('select, input[type="text"]');
            if (lastInput) lastInput.focus();
          }
        }, 50);
      }

      // ── Build the edit form dynamically ──
      function renderPOEditForm(po) {
        var container = document.getElementById('poEditContainer');
        if (!po) {
          container.innerHTML = '<div class="card-body"><div class="alert alert-error shadow-sm"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><span>PO not found.</span></div><a href="po-list.html" class="btn btn-ghost btn-sm mt-4">\u2190 Back to list</a></div>';
          return;
        }

        var items = po.items || [];
        if (typeof items === 'string') { try { items = JSON.parse(items); } catch(e) { items = []; } }
        editItems = items.map(function(i) { return Object.assign({}, i); });

        var h = '';
        h += '<div class="card-body">';
        h += '<form id="editPOForm">';
        h += '<input type="hidden" name="po_id" value="' + escHtml(po.po_id || po.po_no || '') + '">';

        // ── SECTION 1: PO Details ──
        h += '<div class="section-badge"><span class="badge-num">1</span> PO Details</div>';
        h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">PO Number</span></label><input type="text" name="po_no" id="edit_po_no" class="input input-bordered w-full" value="' + escHtml(po.po_no || '') + '" required></div>';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">PO Date</span></label><input type="date" name="po_date" id="edit_po_date" class="input input-bordered w-full" value="' + escHtml(po.po_date || '') + '" required></div>';
        h += '</div>';

        // ── SECTION 2: Vendor Details ──
        h += '<div class="section-badge"><span class="badge-num">2</span> Vendor Details</div>';
        h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">Vendor Name</span></label>';
        h += '<div class="vendor-input-row"><div class="vendor-dropdown-wrap" id="vendorDropdownWrap"><input type="text" name="vendor_name" id="vendor_name" class="input input-bordered w-full vendor-dd-input" autocomplete="off" placeholder="Search or type vendor..." value="' + escHtml(po.vendor_name || '') + '" required><div class="vendor-dd-list" id="vendorDDList"></div></div>';
        h += '<button type="button" class="btn btn-primary btn-square vendor-quick-add-btn" title="Quick add new vendor" onclick="quickAddVendorFromInput()"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg></button></div></div>';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">Vendor GSTIN</span></label><input type="text" name="vendor_gstin" id="vendor_gstin" class="input input-bordered w-full" value="' + escHtml(po.vendor_gstin || '') + '" placeholder="e.g. 33XXXXX..."></div>';
        h += '<div class="form-control md:col-span-2"><label class="label"><span class="label-text font-medium">Vendor Address</span></label><textarea name="vendor_address" id="vendor_address" class="textarea textarea-bordered w-full" rows="2" placeholder="Vendor full address">' + escHtml(po.vendor_address || '') + '</textarea></div>';
        h += '</div>';

        // ── SECTION 3: Event & Client ──
        h += '<div class="section-badge"><span class="badge-num">3</span> Event &amp; Client</div>';
        h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">Client Name</span></label><input type="text" name="client_name" id="edit_client_name" class="input input-bordered w-full" value="' + escHtml(po.client_name || '') + '" placeholder="M/s. ..."></div>';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">Event Name</span></label><input type="text" name="event_name" id="edit_event_name" class="input input-bordered w-full" value="' + escHtml(po.event_name || '') + '"></div>';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">Event Location</span></label><input type="text" name="event_location" id="edit_event_location" class="input input-bordered w-full" value="' + escHtml(po.event_location || '') + '" required></div>';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">Event Date</span></label><input type="text" name="event_date" id="edit_event_date" class="input input-bordered w-full" value="' + escHtml(po.event_date || '') + '" placeholder="e.g. 23-02-2026 TO 01-03-2026 (8DAYS)" required></div>';
        h += '</div>';

        // ── SECTION 4: Line Items ──
        h += '<div class="section-badge"><span class="badge-num">4</span> Line Items</div>';

        // Inline items table (master select + custom input per row, Add Row in table footer)
        h += '<div class="text-xs text-base-content/50 mb-1"><span class="font-semibold text-primary">Tip:</span> Check the box to pick from Item Master, uncheck for custom entry</div>';
        h += '<div id="editItemsTable" class="rounded-lg border border-base-300 mb-4"></div>';

        // ── SECTION 5: Charges & Terms ──
        h += '<div class="section-badge"><span class="badge-num">5</span> Charges &amp; Terms</div>';
        h += '<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">Transport Charges</span></label><input type="number" name="transport" id="editTransport" class="input input-bordered w-full" value="' + (po.transport || 0) + '" min="0" oninput="renderEditItemsTable()"></div>';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">CGST %</span></label><input type="number" name="cgst_percent" id="edit_cgst_percent" class="input input-bordered w-full" value="' + (po.cgst_percent || 0) + '" min="0" max="100" step="0.01" oninput="renderEditItemsTable()"></div>';
        h += '<div class="form-control"><label class="label"><span class="label-text font-medium">SGST %</span></label><input type="number" name="sgst_percent" id="edit_sgst_percent" class="input input-bordered w-full" value="' + (po.sgst_percent || 0) + '" min="0" max="100" step="0.01" oninput="renderEditItemsTable()"></div>';
        h += '</div>';
        h += '<div class="form-control mb-4"><label class="label"><span class="label-text font-medium">Terms of Payment</span></label><input type="text" name="terms" id="edit_terms" class="input input-bordered w-full" value="' + escHtml(po.terms || '') + '"></div>';

        // ── Totals & Actions ──
        h += '<div class="bg-base-200 rounded-xl p-4 mt-4">';
        h += '<div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">';
        h += '<div>';
        h += '<div class="text-sm text-base-content/60">Subtotal: \u20b9<span id="editSubtotalLine" class="font-semibold">0</span></div>';
        h += '<div class="text-xs text-base-content/50" id="editCgstLine"></div>';
        h += '<div class="text-xs text-base-content/50" id="editSgstLine"></div>';
        h += '<div class="text-2xl font-bold mt-1 text-primary">\u20b9<span id="editGrandTotal">0</span></div>';
        h += '</div>';
        h += '<div class="flex gap-2">';
        h += '<a href="po-view.html?id=' + encodeURIComponent(String(po.po_no || '').trim()) + '" class="btn btn-ghost btn-sm gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg> View PO</a>';
        h += '<button type="submit" id="editUpdateBtn" class="btn btn-primary gap-1"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> Update PO</button>';
        h += '</div>';
        h += '</div></div>';

        h += '</form></div>';
        container.innerHTML = h;
        renderEditItemsTable();

        // Wire up form submit
        document.getElementById('editPOForm').onsubmit = function(e) {
          e.preventDefault();
          var fd = new FormData(this);
          var data = {};
          fd.forEach(function(v, k) { data[k] = v; });
          data.items = editItems;
          var btn = document.getElementById('editUpdateBtn');
          setBtnLoading(btn, true);
          gsPost({ action: 'update', ...data })
          .then(function(resp) {
            setBtnLoading(btn, false);
            if (resp.success) {
              showToast('PO updated successfully!', 'success');
              setTimeout(function() {
                window.location.href = 'po-view.html?id=' + encodeURIComponent(data.po_no);
              }, 800);
            } else {
              showToast('Failed to update: ' + (resp.error || 'Unknown error'), 'error');
            }
          })
          .catch(function(err) { setBtnLoading(btn, false); showToast('Error: ' + err.message, 'error'); });
        };

        // Attach preview listeners
        var formEl = document.getElementById('editPOForm');
        if (formEl) {
          formEl.addEventListener('input', schedulePreview);
          formEl.addEventListener('change', schedulePreview);
        }

        // Initial preview
        setTimeout(generateLivePreview, 600);
      }

      // ── Page load ──
      window.onload = function() {
        if (!initPageAuth()) return;
        // Block users without PO manage permission.
        if (!canManagePO()) {
          document.querySelector('.drawer-content').innerHTML = '<div class="p-6"><div class="alert alert-warning"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" /></svg><span>Access denied. You do not have permission to edit Purchase Orders.</span></div><a href="po-list.html" class="btn btn-primary btn-sm mt-4">&larr; View POs</a></div>';
          return;
        }
        var poId = String(getQueryParam('id') || '').trim();

        // Fetch PO data, vendors, and items in parallel
        Promise.all([
          gsFetch(GOOGLE_SCRIPT_URL + '?action=read').then(function(r) { return r.json(); }),
          gsFetch(GOOGLE_SCRIPT_URL + '?action=read_vendors').then(function(r) { return r.json(); }).catch(function() { return []; }),
          gsFetch(GOOGLE_SCRIPT_URL + '?action=read_items').then(function(r) { return r.json(); }).catch(function() { return []; })
        ]).then(function(results) {
          var data = results[0];
          var vendors = results[1];
          var items = results[2];

          // Store globally
          vendorMasterList = (vendors || []).map(function(v) {
            return { name: v.name || '', address: v.address || '', gstin: v.gstin || '' };
          });
          itemMasterCache = items || [];

          var po = (data || []).find(function(p) {
            return String(p.po_no || '').trim() === poId || String(p.po_id || '').trim() === poId;
          });
          renderPOEditForm(po);

          // Init vendor dropdown
          if (document.getElementById('vendorDropdownWrap')) {
            initVendorDropdown('vendorDropdownWrap', 'vendor_name', 'vendorDDList');
          }
        }).catch(function() {
          document.getElementById('poEditContainer').innerHTML = '<div class="card-body"><div class="alert alert-error">Failed to load PO data. Please check your connection.</div></div>';
        });
      };
    </script>
</body>
</html>
